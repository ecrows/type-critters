<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Type Critters</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Confetti overlay -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Boss word banner -->
  <div id="boss-banner">⭐ CHALLENGE WORD! ⭐</div>

  <!-- Unicorn flyby -->
  <div id="unicorn">🦄</div>

  <!-- ===== START SCREEN ===== -->
  <div id="start-screen">
    <div id="start-title">Type Critters</div>
    <div id="start-emojis"></div>
    <button id="play-btn">PLAY</button>
  </div>

  <!-- ===== SETTINGS GEAR (tiny, top-right corner) ===== -->
  <div id="settings-gear" title="Hold to open settings">&#9881;</div>

  <!-- ===== SETTINGS PANEL ===== -->
  <div id="settings-panel">
    <div id="settings-inner">
      <div class="settings-title">Settings</div>

      <label class="setting-row">
        <span>Word size</span>
        <select id="setting-length">
          <option value="all">All words</option>
          <option value="short">Short (2-3)</option>
          <option value="medium">Medium (4)</option>
          <option value="long">Long (5)</option>
        </select>
      </label>

      <label class="setting-row">
        <span>Category</span>
        <select id="setting-category">
          <option value="all">Everything</option>
          <option value="animals">Animals</option>
          <option value="food">Food</option>
          <option value="nature">Nature</option>
          <option value="things">Things</option>
          <option value="home">Home</option>
        </select>
      </label>

      <label class="setting-row">
        <span>UPPERCASE letters</span>
        <input type="checkbox" id="setting-uppercase" checked>
        <span class="toggle"></span>
      </label>

      <label class="setting-row">
        <span>Sound</span>
        <input type="checkbox" id="setting-sound" checked>
        <span class="toggle"></span>
      </label>

      <button id="settings-close">Done</button>
    </div>
  </div>

  <!-- ===== MAIN GAME AREA ===== -->
  <div id="game-area" class="hidden">
    <!-- Celebration appears above the word -->
    <div id="celebration">
      <div id="hooray">HOORAY!</div>
      <div id="emoji"></div>
    </div>

    <!-- Word display -->
    <div id="letters"></div>

    <!-- Idle nudge (pointing hand) -->
    <div id="idle-nudge">&#128073;</div>

    <!-- Press space prompt (below word) -->
    <div id="prompt"><span class="spacebar-key">press SPACE for the next word</span></div>
  </div>

  <!-- ===== CRITTER PARADE (bottom of screen) ===== -->
  <div id="critter-parade"></div>

  <!-- ===== LAST KEY PRESSED ===== -->
  <div id="last-key"></div>

  <!-- ===== ROUND COMPLETE OVERLAY ===== -->
  <div id="round-overlay">
    <div id="round-overlay-emojis"></div>
    <div id="round-overlay-title">AMAZING!</div>
    <div id="round-fireworks-prompt">press SPACE for FIREWORKS! 🎆</div>
    <div id="round-overlay-prompt"><span class="spacebar-key">press SPACE to keep going!</span></div>
  </div>

  <!-- ===== SESSION SUMMARY (shown on exit) ===== -->
  <div id="summary-overlay" class="hidden">
    <div id="summary-box">
      <div id="summary-title">Great job!</div>
      <div id="summary-count"></div>
      <div id="summary-critters"></div>
      <div id="summary-hint">press ESCAPE again to close</div>
    </div>
  </div>

  <!-- Scripts: order matters -->
  <script src="words.js"></script>
  <script src="confetti.js"></script>
  <script src="sounds.js"></script>
  <script src="game.js"></script>

</body>
</html>
